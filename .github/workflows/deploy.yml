name: Build & Deploy to IONOS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_AI_API_KEY: ${{ secrets.VITE_AI_API_KEY }}
          VITE_AI_MODEL: ${{ secrets.VITE_AI_MODEL }}

      - name: Install lftp
        run: sudo apt-get install -y lftp

      - name: Deploy via SFTP to IONOS
        run: |
          lftp -c "
            set sftp:auto-confirm yes;
            set net:max-retries 3;
            open sftp://${{ secrets.SFTP_USERNAME }}:${{ secrets.SFTP_PASSWORD }}@${{ secrets.SFTP_HOST }}:22;
            mirror --reverse --delete --verbose ./dist/ ${{ secrets.SFTP_PATH }};
            bye
          "
